{% extends "base_user.html" %}

{% block title %}{{ page.title }}{% endblock %}

{% block content %}
<section class="page-head">
  <h1 class="page-title">{{ page.title }}</h1>
  <p class="page-subtitle">
    {% if page.section_id %}
      {{ page.section.title }}
    {% else %}
      База знаний
    {% endif %}
  </p>
</section>

<section class="card">
  <div class="card-body">
    <div class="content-block">
      {{ page.content|linebreaks }}
    </div>
  </div>
</section>
{% endblock %}
